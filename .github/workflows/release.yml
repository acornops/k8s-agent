name: Release Agent Image and Chart

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: acornops/k8s-agent
  CHART_NAME: acornops-k8s-agent
  CHART_DIR: charts/acornops-k8s-agent

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Run Validate
        run: npm run validate:ci

  unit-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run coverage
        run: npm run test:coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install k3d
        run: wget -qO - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
      - name: Create k3d cluster
        run: k3d cluster create test-cluster --no-lb --wait
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          ACORNOPS_CLUSTER_ID: "cluster-release"
          ACORNOPS_AGENT_KEY: "test-key"

  helm-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Install k3d
        run: wget -qO - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
      - name: Create k3d cluster
        run: k3d cluster create chart-smoke --no-lb --wait
      - name: Build local agent image
        run: docker build -t ghcr.io/acornops/k8s-agent:ci .
      - name: Load local agent image
        run: k3d image import ghcr.io/acornops/k8s-agent:ci -c chart-smoke
      - name: Install chart with non-routable websocket endpoint
        run: |
          helm upgrade --install acornops-agent charts/acornops-k8s-agent \
            --namespace acornops --create-namespace \
            --set-string image.tag=ci \
            --set image.pullPolicy=IfNotPresent \
            --set-string config.websocketUrl=wss://mock-platform.invalid/agent \
            --set-string config.clusterId=cluster-smoke \
            --set-string config.agentKey=test-key
      - name: Verify rollout
        run: kubectl -n acornops rollout status deployment/acornops-agent --timeout=90s
      - name: Verify read-only RBAC
        run: |
          kubectl auth can-i list pods --as=system:serviceaccount:acornops:acornops-agent
          kubectl auth can-i list nodes --as=system:serviceaccount:acornops:acornops-agent
          kubectl auth can-i list namespaces --as=system:serviceaccount:acornops:acornops-agent
          if kubectl auth can-i patch deployments --as=system:serviceaccount:acornops:acornops-agent; then
            echo "default chart unexpectedly allows deployment patch"
            exit 1
          fi
      - name: Show agent logs
        if: always()
        run: kubectl -n acornops logs deployment/acornops-agent --tail=100 || true

  release:
    needs: [validate, unit-tests, e2e-tests, helm-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "image_tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.image_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          helm package "${CHART_DIR}" \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"

      - name: Push chart
        run: helm push "${CHART_NAME}-${{ steps.version.outputs.version }}.tgz" oci://${{ env.REGISTRY }}/acornops/charts
