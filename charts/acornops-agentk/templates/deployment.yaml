{{- $platformAdditionalCaEnabled := include "acornops-agent.platformAdditionalCaEnabled" . -}}
{{- $platformAdditionalCaInlinePem := default "" .Values.config.tls.additionalCaBundle.inlinePem -}}
{{- $podAnnotations := deepCopy (default dict .Values.podAnnotations) -}}
{{- if $platformAdditionalCaInlinePem -}}
{{- $_ := set $podAnnotations "checksum/platform-additional-ca" ($platformAdditionalCaInlinePem | sha256sum) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acornops-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acornops-agent.labels" . | nindent 4 }}
spec:
  {{- if and (gt (int .Values.replicaCount) 1) (not .Values.leaderElection.enabled) }}
  {{- fail "leaderElection.enabled must be true when replicaCount is greater than 1; the agent supports active-passive HA, not active-active" }}
  {{- end }}
  {{- if ge (int .Values.leaderElection.renewDeadlineMs) (int .Values.leaderElection.leaseDurationMs) }}
  {{- fail "leaderElection.renewDeadlineMs must be less than leaderElection.leaseDurationMs" }}
  {{- end }}
  {{- if gt (int .Values.leaderElection.retryPeriodMs) (int .Values.leaderElection.renewDeadlineMs) }}
  {{- fail "leaderElection.retryPeriodMs must be less than or equal to leaderElection.renewDeadlineMs" }}
  {{- end }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "acornops-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "acornops-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "acornops-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "acornops-agent.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if $platformAdditionalCaEnabled }}
          volumeMounts:
            - name: platform-additional-ca
              mountPath: {{ include "acornops-agent.platformAdditionalCaPath" . | quote }}
              subPath: platform-ca.pem
              readOnly: true
          {{- end }}
          env:
            - name: ACORNOPS_AGENT_PLATFORM_URL
              value: {{ include "acornops-agent.websocketUrl" . | quote }}
            {{- if $platformAdditionalCaEnabled }}
            - name: NODE_EXTRA_CA_CERTS
              value: {{ include "acornops-agent.platformAdditionalCaPath" . | quote }}
            {{- end }}
            - name: ACORNOPS_CLUSTER_ID
              value: {{ required "config.clusterId is required" .Values.config.clusterId | quote }}
            - name: ACORNOPS_AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "acornops-agent.secretName" . }}
                  key: {{ include "acornops-agent.secretKey" . }}
            - name: ACORNOPS_AGENT_WRITE_ENABLED
              value: {{ .Values.rbac.write.enabled | quote }}
            - name: ACORNOPS_AGENT_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: ACORNOPS_AGENT_HANDSHAKE_PROBE_TIMEOUT_MS
              value: {{ .Values.config.handshakeProbeTimeoutMs | quote }}
            - name: ACORNOPS_AGENT_K8S_CONCURRENCY
              value: {{ .Values.config.k8sConcurrency | quote }}
            - name: ACORNOPS_AGENT_K8S_LIST_PAGE_LIMIT
              value: {{ .Values.config.k8sListPageLimit | quote }}
            - name: ACORNOPS_AGENT_TOOL_READ_CONCURRENCY
              value: {{ .Values.config.toolReadConcurrency | quote }}
            - name: ACORNOPS_AGENT_TOOL_WRITE_CONCURRENCY
              value: {{ .Values.config.toolWriteConcurrency | quote }}
            - name: ACORNOPS_AGENT_TOOL_QUEUE_LIMIT
              value: {{ .Values.config.toolQueueLimit | quote }}
            - name: ACORNOPS_AGENT_TOOL_MAX_INPUT_BYTES
              value: {{ .Values.config.toolMaxInputBytes | quote }}
            - name: ACORNOPS_AGENT_TOOL_MAX_OUTPUT_BYTES
              value: {{ .Values.config.toolMaxOutputBytes | quote }}
            - name: ACORNOPS_AGENT_SCALE_MAX_REPLICAS
              value: {{ .Values.config.scaleMaxReplicas | quote }}
            - name: ACORNOPS_AGENT_ALLOW_SCALE_TO_ZERO
              value: {{ .Values.config.allowScaleToZero | quote }}
            - name: ACORNOPS_AGENT_PATCH_KINDS
              value: {{ join "," .Values.patchPolicy.kinds | quote }}
            - name: ACORNOPS_AGENT_ALLOW_SERVICE_SELECTOR_PATCH
              value: {{ .Values.patchPolicy.allowServiceSelectorChanges | quote }}
            - name: ACORNOPS_AGENT_RBAC_SCOPE
              value: {{ .Values.rbac.scope | quote }}
            - name: ACORNOPS_AGENT_WATCH_CACHE_ENABLED
              value: {{ .Values.config.watchCacheEnabled | quote }}
            - name: ACORNOPS_AGENT_WATCH_SNAPSHOT_DEBOUNCE_MS
              value: {{ .Values.config.watchSnapshotDebounceMs | quote }}
            - name: ACORNOPS_AGENT_WATCH_CACHE_SYNC_TIMEOUT_MS
              value: {{ .Values.config.watchCacheSyncTimeoutMs | quote }}
            - name: ACORNOPS_AGENT_WATCH_TIMEOUT_SECONDS
              value: {{ .Values.config.watchTimeoutSeconds | quote }}
            - name: ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED
              value: {{ .Values.config.localFallbackEnabled | quote }}
            - name: ACORNOPS_AGENT_LEADER_ELECTION_ENABLED
              value: {{ .Values.leaderElection.enabled | quote }}
            - name: ACORNOPS_AGENT_LEASE_NAME
              value: {{ .Values.leaderElection.leaseName | quote }}
            - name: ACORNOPS_AGENT_LEASE_NAMESPACE
              value: {{ .Values.leaderElection.leaseNamespace | quote }}
            - name: ACORNOPS_AGENT_LEASE_DURATION_MS
              value: {{ .Values.leaderElection.leaseDurationMs | quote }}
            - name: ACORNOPS_AGENT_RENEW_DEADLINE_MS
              value: {{ .Values.leaderElection.renewDeadlineMs | quote }}
            - name: ACORNOPS_AGENT_RETRY_PERIOD_MS
              value: {{ .Values.leaderElection.retryPeriodMs | quote }}
            - name: ACORNOPS_AGENT_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ACORNOPS_AGENT_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: ACORNOPS_AGENT_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if eq .Values.rbac.scope "namespace" }}
            - name: ACORNOPS_AGENT_WATCH_NAMESPACES
              value: {{ join "," (include "acornops-agent.rbacNamespaces" . | fromYamlArray) | quote }}
            {{- else if .Values.namespaceScope.include }}
            - name: ACORNOPS_AGENT_WATCH_NAMESPACES
              value: {{ join "," .Values.namespaceScope.include | quote }}
            {{- else if .Values.config.watchNamespaces }}
            - name: ACORNOPS_AGENT_WATCH_NAMESPACES
              value: {{ .Values.config.watchNamespaces | quote }}
            {{- end }}
            - name: ACORNOPS_AGENT_EXCLUDE_NAMESPACES
              value: {{ join "," .Values.namespaceScope.exclude | quote }}
            - name: AGENT_VERSION
              value: {{ .Chart.AppVersion | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if $platformAdditionalCaInlinePem }}
      volumes:
        - name: platform-additional-ca
          configMap:
            name: {{ include "acornops-agent.platformAdditionalCaConfigMapName" . | quote }}
            items:
              - key: ca.crt
                path: platform-ca.pem
      {{- else }}
      {{- with .Values.config.tls.additionalCaBundle.configMapKeyRef }}
      volumes:
        - name: platform-additional-ca
          configMap:
            name: {{ .name | quote }}
            items:
              - key: {{ .key | quote }}
                path: platform-ca.pem
      {{- end }}
      {{- with .Values.config.tls.additionalCaBundle.secretKeyRef }}
      volumes:
        - name: platform-additional-ca
          secret:
            secretName: {{ .name | quote }}
            items:
              - key: {{ .key | quote }}
                path: platform-ca.pem
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
