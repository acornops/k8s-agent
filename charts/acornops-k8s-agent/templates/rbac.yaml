{{- if .Values.rbac.create -}}
{{- if .Values.leaderElection.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "acornops-agent.leaderElectionName" . }}
  namespace: {{ include "acornops-agent.leaseNamespace" . }}
  labels:
    {{- include "acornops-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "acornops-agent.leaderElectionName" . }}
  namespace: {{ include "acornops-agent.leaseNamespace" . }}
  labels:
    {{- include "acornops-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "acornops-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "acornops-agent.leaderElectionName" . }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- if eq .Values.rbac.scope "cluster" -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "acornops-agent.fullname" . }}
  labels:
    {{- include "acornops-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "persistentvolumeclaims", "events", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  {{- if .Values.rbac.write.enabled }}
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale"]
    verbs: ["patch", "update"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "acornops-agent.fullname" . }}
  labels:
    {{- include "acornops-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "acornops-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "acornops-agent.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- else if eq .Values.rbac.scope "namespace" -}}
{{- $root := . -}}
{{- range $index, $namespace := (include "acornops-agent.rbacNamespaces" . | fromYamlArray) }}
{{- if $index }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "acornops-agent.fullname" $root }}
  namespace: {{ $namespace }}
  labels:
    {{- include "acornops-agent.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  {{- if $root.Values.rbac.write.enabled }}
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale"]
    verbs: ["patch", "update"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "acornops-agent.fullname" $root }}
  namespace: {{ $namespace }}
  labels:
    {{- include "acornops-agent.labels" $root | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "acornops-agent.serviceAccountName" $root }}
    namespace: {{ $root.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "acornops-agent.fullname" $root }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- else -}}
{{- fail "rbac.scope must be cluster or namespace" -}}
{{- end -}}
{{- end }}
