# Number of agent pod replicas. Values above 1 require leaderElection.enabled=true;
# HA mode is active-passive, with exactly one elected replica connecting.
replicaCount: 1

image:
  # Container image repository for the agent.
  repository: ghcr.io/acornops/k8s-agent
  # Image tag to deploy. Defaults to the chart's appVersion when left empty.
  tag: ""
  # Kubernetes image pull policy: Always | IfNotPresent | Never.
  pullPolicy: IfNotPresent

# List of image pull secret names for pulling from private registries, e.g. [{name: my-secret}].
imagePullSecrets: []
# Partial override for the chart's resource name prefix.
nameOverride: acornops-agent
# Full override for every resource name generated by the chart. Overrides nameOverride when set.
fullnameOverride: ""

serviceAccount:
  # Whether to create a dedicated ServiceAccount for the agent pod.
  create: true
  # Annotations to add to the ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # Name of the ServiceAccount to use. Auto-generated from the release name when left empty.
  name: ""

config:
  # Public base URL of the AcornOps platform (e.g. https://api.acornops.dev).
  # The agent derives the WebSocket endpoint as wss://<host>/api/v1/agent/connect.
  # Required unless websocketUrl is set directly.
  platformUrl: ""
  # Override the full WebSocket endpoint. Use only when the endpoint cannot be
  # derived from platformUrl (e.g. wss://agent.example.com/custom-agent-path).
  websocketUrl: ""
  # Control-plane cluster identifier issued during cluster registration.
  clusterId: ""
  # Agent authentication key issued by the AcornOps platform.
  # Ignored when existingSecret.name is set.
  agentKey: ""
  # Comma-separated list of namespaces for the agent to watch. Watches all
  # namespaces when empty. Superseded by namespaceScope.include/exclude when set.
  watchNamespaces: ""
  # Log verbosity level: trace | debug | info | warn | error.
  logLevel: info
  # Milliseconds the agent waits for a handshake acknowledgment from the control
  # plane before treating the connection as failed.
  handshakeProbeTimeoutMs: 3000
  # Process-wide maximum concurrent Kubernetes API list requests during snapshot collection.
  k8sConcurrency: 8
  # Kubernetes API list page size used when collecting large snapshots.
  k8sListPageLimit: 500
  # When true, the agent serves a local fallback mode, allowing read-only tool
  # calls even when the control-plane WebSocket is disconnected.
  localFallbackEnabled: false

leaderElection:
  # Enable Kubernetes Lease-based active-passive HA. Required when replicaCount > 1.
  enabled: false
  # Lease name used by replicas to elect the single active agent runtime.
  leaseName: acornops-agent-leader
  # Namespace for the Lease. Defaults to the pod/release namespace when empty.
  leaseNamespace: ""
  # Lease duration. Shorter values fail over faster but increase API churn and
  # sensitivity to transient Kubernetes API delays.
  leaseDurationMs: 15000
  # Maximum time a leader may fail to renew before fencing itself locally.
  renewDeadlineMs: 10000
  # Election retry and renew cadence.
  retryPeriodMs: 2000

# Reference an existing Kubernetes Secret that holds the agent key instead of
# embedding it in config.agentKey. The Secret must exist in the release namespace.
existingSecret:
  # Name of the existing Secret. Leave empty to use config.agentKey instead.
  name: ""
  # Key within the Secret whose value is the agent authentication token.
  key: agent-key

# Filters that control which namespaces the agent observes and reports on.
namespaceScope:
  # Explicit allow-list of namespaces. When non-empty, only these namespaces are
  # watched. Takes precedence over config.watchNamespaces.
  include: []
  # Deny-list of namespaces to skip. Applied after the include list.
  exclude: []

rbac:
  # Whether the chart creates ClusterRole / Role and binding resources.
  # Set to false only if you manage RBAC externally.
  create: true
  # Scope of RBAC resources: cluster (ClusterRole + ClusterRoleBinding) or
  # namespace (Role + RoleBinding scoped to rbac.namespaces / namespaceScope.include).
  scope: cluster
  # Namespaces in which to create Roles when scope=namespace. Falls back to
  # namespaceScope.include, then the release namespace, when empty.
  namespaces: []
  write:
    # Enable write/mutation tools (e.g. restart workload). When false the agent
    # advertises read-only capabilities and the chart grants no mutation verbs.
    enabled: false

# Annotations added to every agent pod (e.g. for Prometheus scraping or Vault injection).
podAnnotations: {}
# Extra labels added to every agent pod.
podLabels: {}

# Pod-level security context applied to all containers in the pod.
podSecurityContext:
  # Reject containers that would run as root.
  runAsNonRoot: true
  # UID the agent process runs as.
  runAsUser: 10001
  # GID the agent process runs as.
  runAsGroup: 10001
  # GID used to own volume mounts, ensuring the agent can write to them.
  fsGroup: 10001
  seccompProfile:
    # Seccomp profile type: RuntimeDefault restricts syscalls to the container
    # runtime's default allowlist.
    type: RuntimeDefault

# Container-level security context for the agent container.
securityContext:
  # Prevent the process from gaining additional privileges via setuid / setgid.
  allowPrivilegeEscalation: false
  # Mount the root filesystem read-only to reduce the attack surface.
  readOnlyRootFilesystem: true
  capabilities:
    # Drop all Linux capabilities; the agent does not require any.
    drop:
      - ALL

# CPU and memory resource requests and limits for the agent container.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Node selector constraints for scheduling the agent pod onto specific nodes.
nodeSelector: {}
# Tolerations allowing the agent pod to be scheduled on tainted nodes.
tolerations: []
# Affinity / anti-affinity rules for fine-grained pod scheduling control.
affinity: {}
# Topology spread constraints for HA scheduling when leaderElection is enabled.
topologySpreadConstraints: []

podDisruptionBudget:
  # Optional PDB for active-passive HA installs.
  enabled: false
  minAvailable: 1
