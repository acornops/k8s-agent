services:
  acornops-agentk:
    image: ${ACORNOPS_AGENT_IMAGE:-ghcr.io/acornops/agentk:0.0.1-experimental.8}
    environment:
      ACORNOPS_AGENT_PLATFORM_URL: ${ACORNOPS_AGENT_PLATFORM_URL:-ws://control-plane:8081/api/v1/agent/connect}
      ACORNOPS_CLUSTER_ID: ${ACORNOPS_CLUSTER_ID:-change-me-cluster}
      ACORNOPS_AGENT_KEY: ${ACORNOPS_AGENT_KEY:-change-me}
      ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK: ${ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK:-false}
      ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS: ${ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS:-host.docker.internal}
      ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY: ${ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY:-false}
      ACORNOPS_AGENT_WATCH_NAMESPACES: ${ACORNOPS_AGENT_WATCH_NAMESPACES:-}
      ACORNOPS_AGENT_WRITE_ENABLED: ${ACORNOPS_AGENT_WRITE_ENABLED:-false}
      ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED: ${ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED:-false}
      ACORNOPS_AGENT_LOG_LEVEL: ${ACORNOPS_AGENT_LOG_LEVEL:-info}
    restart: unless-stopped
