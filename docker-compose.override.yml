services:
  acornops-k8s-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: acornops/k8s-agent:local
    command: ["npm", "run", "dev"]
    environment:
      ACORNOPS_AGENT_PLATFORM_URL: ws://mock-platform:3000/agent
      ACORNOPS_CLUSTER_ID: cluster-local-456
      ACORNOPS_AGENT_KEY: test-agent-key-123
      ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK: ${ACORNOPS_AGENT_KUBECONFIG_REWRITE_LOOPBACK:-true}
      ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS: ${ACORNOPS_AGENT_KUBECONFIG_HOST_ALIAS:-host.docker.internal}
      ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY: ${ACORNOPS_AGENT_KUBECONFIG_SKIP_TLS_VERIFY:-true}
      ACORNOPS_AGENT_LOG_LEVEL: debug
      ACORNOPS_AGENT_WRITE_ENABLED: ${ACORNOPS_AGENT_WRITE_ENABLED:-true}
      ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED: ${ACORNOPS_AGENT_LOCAL_FALLBACK_ENABLED:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      KUBECONFIG: /root/.kube/config
    depends_on:
      mock-platform:
        condition: service_started
    volumes:
      - ./:/app
      - k8s-agent-node-modules:/app/node_modules
      - ${HOME}/.kube:/root/.kube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mock-platform:
    build:
      context: ./scripts/mock-platform
    ports:
      - "3000:3000"
    environment:
      SNAPSHOT_DIR: /app/snapshots
      NODE_ENV: development
    command: ["node", "--watch", "server.js"]
    restart: unless-stopped
    volumes:
      - ./scripts/mock-platform:/app
      - mock-platform-node-modules:/app/node_modules
      - ./local-snapshots:/app/snapshots

networks:
  default:
    name: acornops-net

volumes:
  k8s-agent-node-modules:
  mock-platform-node-modules:
